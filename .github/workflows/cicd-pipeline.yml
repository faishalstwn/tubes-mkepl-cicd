name: CI/CD Pipeline - Tubes Manajemen Konfigurasi dan Evolusi PL

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # =========================================================
  # JOB 1 - CONTINUOUS INTEGRATION
  # Tanggung jawab: compile project, pastikan kode bisa dibangun
  # =========================================================
  build:
    name: "1. Continuous Integration - Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build dengan Maven (compile)
        run: mvn -B clean compile

      - name: Package menjadi JAR
        run: mvn -B package -DskipTests

      - name: Upload artifact JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # =========================================================
  # JOB 2 - CONTINUOUS TESTING
  # Tanggung jawab: jalankan unit test & integration test otomatis
  # =========================================================
  test:
    name: "2. Continuous Testing - Unit & Integration Test"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Jalankan Unit Test & Integration Test
        run: mvn -B test

      - name: Generate laporan coverage (JaCoCo)
        run: mvn -B jacoco:report

      - name: Upload laporan test
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/

  # =========================================================
  # JOB 3 - CONTINUOUS INSPECTION
  # Tanggung jawab: analisis kualitas & gaya kode secara statis
  # =========================================================
  inspect:
    name: "3. Continuous Inspection - Static Code Analysis"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Jalankan Checkstyle (analisis statis)
        run: mvn -B checkstyle:check

      - name: Upload laporan inspeksi
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: inspection-report
          path: target/checkstyle-result.xml

  # =========================================================
  # JOB 4 - CONTINUOUS DEPLOYMENT / DELIVERY
  # Tanggung jawab: deploy/publish artifact hasil build setelah
  # semua tahap sebelumnya lolos. Hanya berjalan di branch main.
  # =========================================================
  deploy:
    name: "4. Continuous Deployment - Release Artifact"
    runs-on: ubuntu-latest
    needs: [ build, test, inspect ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact JAR hasil build
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: dist

      - name: Tampilkan isi artifact yang akan dirilis
        run: ls -lh dist

      - name: Buat release tag otomatis
        id: tag
        run: echo "tag_name=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "Release ${{ steps.tag.outputs.tag_name }}"
          files: dist/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
